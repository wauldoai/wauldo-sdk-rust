name: CI & Publish

# Tests run on every push to main + PRs. Publishing happens only on a
# vX.Y.Z tag, via crates.io Trusted Publishing (OIDC) — no token, no
# stored secret. One-time crates.io setup: crate Settings → Trusted
# Publishing → add this repo + this workflow filename (publish.yml).
#
# Release flow: bump version in Cargo.toml, update CHANGELOG.md, then
# `git tag vX.Y.Z && git push origin vX.Y.Z`.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  publish:
    needs: [test]
    # Only publish on a version tag — normal pushes/PRs just run tests.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for crates.io Trusted Publishing
      contents: write # checkout + create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify tag matches crate version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$TAG  Cargo.toml=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $TAG != crate version $PKG"; exit 1; }

      - name: Mint crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
